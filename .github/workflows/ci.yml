name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy --strict)
        run: mypy

      - name: Unit tests (pytest)
        run: pytest -v

      - name: Byte-compile sanity (compileall)
        run: |
          python -m compileall -q agent.py main.py memory_manager.py observer.py tools tests scripts

      - name: Generate offline demo (smoke test for Agent loop end-to-end)
        run: python scripts/_make_demo_offline.py
